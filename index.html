<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hoot</title>
    <meta name="description" content="Een rustige, reclamevrije nieuws-tijdlijn van jouw abonnementen." />
    <meta name="theme-color" content="#21468b" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hoot" />
    <script>
      // Zet het thema vóór render (geen flits): voorkeur uit localStorage, 'system' volgt het OS.
      (function () {
        try {
          var p = localStorage.getItem('hoot:theme') || 'system'
          var dark = p === 'dark' || (p !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
