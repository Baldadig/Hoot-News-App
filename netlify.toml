[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Schone API-routes naar de serverless functies
[[redirects]]
  from = "/api/feed"
  to = "/.netlify/functions/feed"
  status = 200

[[redirects]]
  from = "/api/save"
  to = "/.netlify/functions/save"
  status = 200

# SPA-fallback (laat de PWA alle routes afhandelen)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
